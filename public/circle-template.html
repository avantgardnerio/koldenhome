<!DOCTYPE html>
<html>
<head>
<title>7.5" Circle Cut Template</title>
<style>
@page {
  size: letter;
  margin: 0.25in;
}
@media print {
  body { margin: 0; }
  .no-print { display: none; }
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  font-family: sans-serif;
}
.no-print {
  margin-bottom: 1em;
  color: #666;
}
svg {
  width: 7.5in;
  height: 7.5in;
}
</style>
</head>
<body>
<div class="no-print">7.5" diameter circle — print at 100% scale (no fit-to-page)</div>
<svg viewBox="0 0 7.5 7.5" xmlns="http://www.w3.org/2000/svg">
  <circle cx="3.75" cy="3.75" r="3.75" fill="none" stroke="black" stroke-width="0.02"/>
  <circle cx="3.75" cy="3.75" r="0.05" fill="black"/>
  <line x1="3.55" y1="3.75" x2="3.95" y2="3.75" stroke="black" stroke-width="0.01"/>
  <line x1="3.75" y1="3.55" x2="3.75" y2="3.95" stroke="black" stroke-width="0.01"/>
</svg>
</body>
</html>
